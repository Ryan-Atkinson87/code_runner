# Squid egress proxy for agent-runner (Spec §7.2).
# Domain-level filtering only — no TLS interception, no CA cert.

# Listen on port 3128 for HTTP CONNECT (HTTPS tunnelling) and plain HTTP
http_port 3128

# Load the hostname allowlist
acl allowed_domains dstdomain "/etc/squid/allowlist.txt"

# Allow CONNECT (HTTPS) to allowed domains on standard ports
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow allowed_domains
http_access deny all

# Minimal logging — access log to stdout for Docker, no cache log noise
access_log stdio:/dev/stdout
cache_log /dev/null

# No caching — this is a filtering proxy, not a performance proxy
cache deny all

# Suppress forwarded-for to avoid leaking internal IPs
forwarded_for delete

# Visible hostname for error pages
visible_hostname egress-proxy
